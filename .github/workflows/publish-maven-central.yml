name: Publish to Maven Central

# Push to main        -> publish unsigned -SNAPSHOT artifacts to the Central
#                        Portal snapshot repo.
# Push a v* tag       -> publish GPG-signed release artifacts, auto-released to
#                        Maven Central (no manual "Publish" click).
#
# Required repository secrets:
#   MAVEN_CENTRAL_USERNAME / MAVEN_CENTRAL_PASSWORD
#       Central Portal user token (central.sonatype.com -> Account -> Generate
#       User Token). Used by both jobs.
#   MAVEN_CENTRAL_GPG_KEY
#       ASCII-armored GPG secret key, exported with
#       `gpg --export-secret-keys --armor <key-id>`. Release job only.
#
# Central Portal must have SNAPSHOTs enabled for the com.accucodeai.kash
# namespace, or the snapshot job's upload is rejected.

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

# Don't run two publishes against the same ref at once; let an in-flight
# publish finish rather than cancelling it.
concurrency:
  group: maven-central-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  snapshot:
    # Only on a push to main (tag pushes have ref refs/tags/*, not this).
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    # Credentials live in the "release" environment's secrets; a job can only
    # read environment-scoped secrets when it declares the environment.
    environment: release
    env:
      ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
      ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
    steps:
      - uses: actions/checkout@v5
      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
      - name: Publish snapshot
        # Version stays 0.1.0-SNAPSHOT (from gradle.properties) -> snapshot repo.
        # Config cache is disabled for the publish run: in-memory signing /
        # Central Portal upload tasks are not config-cache friendly.
        run: ./gradlew publishToMavenCentral --no-daemon --no-configuration-cache

  release:
    # Only on a v* tag push.
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    # The credentials and GPG signing key are stored as secrets in the
    # "release" environment. A job can only read environment-scoped secrets
    # when it declares that environment; without this line secrets.* resolve to
    # empty strings and signing fails with "Could not read PGP secret key".
    environment: release
    env:
      ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
      ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
      ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.MAVEN_CENTRAL_GPG_KEY }}
      ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.MAVEN_CENTRAL_GPG_PASSWORD }}
    steps:
      - uses: actions/checkout@v5
      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
      - name: Derive release version from tag
        # Strip the leading "v": refs/tags/v1.2.3 -> 1.2.3
        run: echo "RELEASE_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
      - name: Publish release
        run: ./gradlew publishToMavenCentral -Pversion="$RELEASE_VERSION" --no-daemon --no-configuration-cache
